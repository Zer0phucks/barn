<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}BARN Scanner{% endblock %}</title>
  {% block head %}{% endblock %}
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-2: #222240;
      --border: #2a2a4a;
      --text: #e0e0f0;
      --text-muted: #8888aa;
      --primary: #3498db;
      --primary-hover: #2980b9;
      --success: #27ae60;
      --warning: #f39c12;
      --danger: #e74c3c;
      --radius: 8px;
      --topnav-h: 52px;
      --sidenav-w: 180px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Top Nav ── */
    .topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topnav-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 200;
    }
    .topnav-brand {
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      text-decoration: none;
      margin-right: 32px;
      letter-spacing: 0.5px;
    }
    .topnav-links {
      display: flex;
      gap: 4px;
      flex: 1;
    }
    .topnav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius);
      transition: background 0.15s, color 0.15s;
    }
    .topnav-links a:hover { background: var(--surface-2); color: var(--text); }
    .topnav-links a.active { background: var(--primary); color: #fff; }
    .topnav-user {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .topnav-user a {
      color: var(--danger);
      text-decoration: none;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid var(--danger);
      border-radius: var(--radius);
    }
    .topnav-user a:hover { background: var(--danger); color: #fff; }

    /* ── App shell ── */
    .app-shell {
      display: flex;
      margin-top: var(--topnav-h);
      min-height: calc(100vh - var(--topnav-h));
    }

    /* ── Side Nav ── */
    .sidenav {
      width: var(--sidenav-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      flex-shrink: 0;
      position: sticky;
      top: var(--topnav-h);
      height: calc(100vh - var(--topnav-h));
      overflow-y: auto;
    }
    .sidenav-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      padding: 0 16px 8px;
    }
    .sidenav a {
      display: block;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      padding: 8px 16px;
      border-left: 3px solid transparent;
      transition: background 0.12s, color 0.12s;
    }
    .sidenav a:hover { background: var(--surface-2); color: var(--text); }
    .sidenav a.active {
      border-left-color: var(--primary);
      background: var(--surface-2);
      color: var(--text);
    }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      padding: 28px 32px;
      overflow-x: hidden;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ── Stat boxes ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-box .value { font-size: 28px; font-weight: 700; color: var(--text); }
    .stat-box .label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Buttons ── */
    .btn {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      border-radius: var(--radius);
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      text-decoration: none;
    }
    .btn:hover { background: var(--border); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-success { background: var(--success); border-color: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }

    /* ── Tables ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      background: var(--surface-2);
      color: var(--text-muted);
      font-weight: 600;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .data-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .data-table tr:hover td { background: var(--surface-2); }
    .table-wrap { overflow-x: auto; }

    /* ── Status pills ── */
    .pill {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .pill-pending   { background: rgba(243,156,18,0.2);  color: var(--warning); }
    .pill-reviewing { background: rgba(52,152,219,0.2);  color: var(--primary); }
    .pill-approved  { background: rgba(39,174,96,0.2);   color: var(--success); }
    .pill-rejected  { background: rgba(231,76,60,0.2);   color: var(--danger); }
    .pill-active    { background: rgba(39,174,96,0.2);   color: var(--success); }
    .pill-waitlisted{ background: rgba(155,89,182,0.2);  color: #9b59b6; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidenav { display: none; }
      .main-content { padding: 16px; }
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <a class="topnav-brand" href="/">BARN</a>
    <div class="topnav-links">
      <a href="/" {% if active_nav == 'home' %}class="active"{% endif %}>Home</a>
      <a href="/search" {% if active_nav == 'search' %}class="active"{% endif %}>Search</a>
      <a href="/scan" {% if active_nav == 'scan' %}class="active"{% endif %}>Scan</a>
      <a href="/outreach" {% if active_nav == 'outreach' %}class="active"{% endif %}>Outreach</a>
    </div>
    <div class="topnav-user">
      <span>{{ session.get('user_email', '') }}</span>
      <a href="/logout">Logout</a>
    </div>
  </nav>

  <div class="app-shell">
    {% block sidenav %}{% endblock %}
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
